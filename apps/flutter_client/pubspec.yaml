name: venturelink
description: VentureLink - Startup Fundraising Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - updated versions
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  cloud_functions: ^5.1.0
 
 # Blockchain
  web3dart: ^2.7.3
  http: ^1.2.0
  convert: ^3.1.1
  
  # State Management
  flutter_riverpod: ^2.4.10

  # Routing
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.1

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Utils
  equatable: ^2.0.5
  uuid: ^4.3.3
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/